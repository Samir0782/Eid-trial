<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eid Mubarak 🌙</title>
    <style>
        /* CSS SECTION */
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #050b14;
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        .stars {
            position: fixed;
            width: 100%; height: 100%;
            background: radial-gradient(white 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.1;
            z-index: -1;
        }

        .phase { display: none; height: 100vh; width: 100%; justify-content: center; align-items: center; }
        .phase.active { display: flex; }

        /* PHASE 1: SEARCH AREA */
        #search-area { 
            width: 100vw; 
            height: 100vh; 
            position: relative; 
            overflow: hidden; 
            background: radial-gradient(circle at 50% 50%, #1b2735 0%, #090a0f 100%);
        }

        .text-wrapper {
            position: absolute;
            top: 15%; /* Centered and slightly below top */
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 20;
        }

        #hint-text {
            font-weight: 300;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            text-align: center;
        }

        #reveal-circle {
            position: absolute;
            width: 160px; height: 160px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            box-shadow: 0 0 0 2000px rgba(0, 0, 0, 0.94); 
            transform: translate(-50%, -50%);
            display: none;
            z-index: 10;
        }

        .moon-target {
            position: absolute;
            top: 35%; left: 60%;
            width: 80px; height: auto;
            opacity: 0;
            filter: drop-shadow(0 0 15px white);
            transition: opacity 0.4s, transform 0.5s;
            z-index: 5;
            pointer-events: none;
        }

        .hidden-meme {
            position: absolute;
            width: 120px; border-radius: 10px;
            opacity: 0; z-index: 6;
            transition: opacity 0.3s;
        }

        /* WINDOW UI */
        .window {
            width: 90%; max-width: 380px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            color: #333; border-radius: 15px;
            overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .window-header { background: #eee; padding: 10px; display: flex; justify-content: space-between; font-size: 12px; }
        .window-content { padding: 30px; text-align: center; }

        button {
            background: linear-gradient(45deg, #c9a227, #f7e27c);
            border: none; padding: 12px 20px; border-radius: 25px;
            margin: 10px; font-weight: bold; cursor: pointer;
        }

        .lantern {
            position: fixed; bottom: -50px; font-size: 30px;
            animation: floatUp 8s linear infinite;
            z-index: 100;
        }
        @keyframes floatUp { to { transform: translateY(-120vh); } }
        .gift-box { font-size: 80px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div id="phase1" class="phase active">
        <div id="search-area">
            <div class="text-wrapper">
                <h2 id="hint-text">Search the sky for the moon... 🌙</h2>
            </div>
            <div id="reveal-circle"></div>
            <img id="meme-discovery" src="" class="hidden-meme"> 
            <img id="moon" class="moon-target" src="https://upload.wikimedia.org/wikipedia/commons/2/20/Crescent-Moon.png">
        </div>
    </div>

    <div id="phase2" class="phase">
        <div class="window">
            <div class="window-header">
                <span class="dots">● ● ●</span>
                <span class="title">eid-preparations.app</span>
            </div>
            <div class="window-content">
                <h2>Prepare for Eid</h2>
                <div id="decor-status">The sky is bright! ✨</div>
                <button onclick="lightLanterns()">🏮 Light Lanterns</button>
                <button onclick="nextPhase('phase3')">Continue</button>
            </div>
        </div>
    </div>

    <div id="phase3" class="phase">
        <div class="window">
            <div class="window-header"><span class="title">eidi-gift.exe</span></div>
            <div class="window-content">
                <h2>Your Eidi Awaits 🎁</h2>
                <div class="gift-box" onclick="openBox()">🎁</div>
                <p id="box-instruction">Tap 3 times to open!</p>
            </div>
        </div>
    </div>

    <div id="phase4" class="phase">
        <div class="window">
            <div class="window-header"><span class="title">eid_mubarak_letter.txt</span></div>
            <div class="window-content">
                <h1>Eid Mubarak 🌙✨</h1>
                <p style="margin: 20px 0; line-height: 1.5;">
                    May this Eid bring peace to your heart and barakah to your home.
                </p>
                <h3>— Samir 🌙</h3>
                <button onclick="location.reload()">Restart</button>
            </div>
        </div>
    </div>

    <script>
        /* JAVASCRIPT SECTION */
        const myMemes = ['Aaaah-cat.webp', '8P.jpg'];
        let isRevealed = false;

        function nextPhase(phaseId) {
            document.querySelectorAll('.phase').forEach(p => p.classList.remove('active'));
            document.getElementById(phaseId).classList.add('active');
        }

        const searchArea = document.getElementById('search-area');
        const circle = document.getElementById('reveal-circle');
        const moon = document.getElementById('moon');
        const memeDisplay = document.getElementById('meme-discovery');
        const hint = document.getElementById('hint-text');

        const handleMove = (e) => {
            if (isRevealed) return;
            const x = e.touches ? e.touches[0].pageX : e.pageX;
            const y = e.touches ? e.touches[0].pageY : e.pageY;

            circle.style.display = 'block';
            circle.style.left = x + 'px';
            circle.style.top = y + 'px';

            const moonRect = moon.getBoundingClientRect();
            const moonCenterX = moonRect.left + (moonRect.width / 2);
            const moonCenterY = moonRect.top + (moonRect.height / 2);
            const distance = Math.hypot(x - moonCenterX, y - moonCenterY);

            if (distance < 50) { 
                triggerMagicReveal();
            } else if (distance > 250 && Math.random() > 0.985) {
                showMeme(x, y);
            }
        };

        searchArea.addEventListener('mousemove', handleMove);
        searchArea.addEventListener('touchmove', (e) => { 
            e.preventDefault(); 
            handleMove(e); 
        }, {passive: false});

        function showMeme(x, y) {
            if (memeDisplay.style.opacity == '0') {
                memeDisplay.src = myMemes[Math.floor(Math.random() * myMemes.length)];
                memeDisplay.style.left = (x - 60) + 'px';
                memeDisplay.style.top = (y - 60) + 'px';
                memeDisplay.style.opacity = '1';
                setTimeout(() => memeDisplay.style.opacity = '0', 900);
            }
        }

        function triggerMagicReveal() {
            isRevealed = true;
            moon.style.opacity = '1';
            hint.innerText = "Moon Sighted! ✨";
            lightLanterns();

            setTimeout(() => {
                circle.style.transition = "transform 1.2s ease-in, opacity 1s";
                circle.style.transform = "translate(-50%, -50%) scale(15)";
                circle.style.opacity = "0";
                setTimeout(() => nextPhase('phase2'), 1000);
            }, 1500);
        }

        function lightLanterns() {
            for(let i=0; i<15; i++) {
                setTimeout(() => {
                    let l = document.createElement("div");
                    l.className = "lantern";
                    l.innerText = "🏮";
                    l.style.left = Math.random() * 92 + "%";
                    l.style.animationDuration = (4 + Math.random() * 6) + "s";
                    document.body.appendChild(l);
                }, i * 150);
            }
        }

        let clicks = 0;
        function openBox() {
            clicks++;
            if(clicks < 3) {
                document.getElementById('box-instruction').innerText = `Tap ${3-clicks} more times!`;
            } else {
                nextPhase('phase4');
            }
        }
    </script>
</body>
</html>
